<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Items App - GraphQL</title>
</head>
<body>
  <h1>Items (GraphQL)</h1>

  <button onclick="loadItems()">Load items</button>

  <h2>Add item</h2>
  <input id="name" placeholder="Name" />
  <input id="description" placeholder="Description" />
  <button onclick="addItem()">Add</button>

  <ul id="list"></ul>

  <script>
    async function graphqlRequest(query, variables = {}) {
      const response = await fetch("/.netlify/functions/graphql", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ query, variables })
      });

      const result = await response.json();

      if (result.errors) {
        console.error(result.errors);
        alert("GraphQL error: " + result.errors[0].message);
        return null;
      }

      return result.data;
    }

    async function loadItems() {
      const query = `
        query GetItems {
          items {
            _id
            name
            description
          }
        }
      `;

      const data = await graphqlRequest(query);
      if (!data) return;

      const list = document.getElementById("list");
      list.innerHTML = "";

      data.items.forEach(item => {
        const li = document.createElement("li");
        li.innerHTML = `
          ${item.name} - ${item.description}
          <button onclick="editItem('${item._id}')">Edit</button>
          <button onclick="deleteItem('${item._id}')">Delete</button>
        `;
        list.appendChild(li);
      });
    }

    async function addItem() {
      const name = document.getElementById("name").value.trim();
      const description = document.getElementById("description").value.trim();

      if (!name || !description) {
        alert("Please fill in both fields.");
        return;
      }

      const mutation = `
        mutation CreateItem($name: String!, $description: String!) {
          createItem(name: $name, description: $description) {
            _id
            name
            description
          }
        }
      `;

      const variables = { name, description };

      const data = await graphqlRequest(mutation, variables);
      if (!data) return;

      document.getElementById("name").value = "";
      document.getElementById("description").value = "";

      loadItems();
    }

    async function deleteItem(id) {
      const mutation = `
        mutation DeleteItem($id: ID!) {
          deleteItem(id: $id)
        }
      `;

      const variables = { id };

      const data = await graphqlRequest(mutation, variables);
      if (!data) return;

      loadItems();
    }

    async function editItem(id) {
      const newName = prompt("Enter new name:");
      if (newName === null) return;

      const newDescription = prompt("Enter new description:");
      if (newDescription === null) return;

      const mutation = `
        mutation UpdateItem($id: ID!, $name: String, $description: String) {
          updateItem(id: $id, name: $name, description: $description) {
            _id
            name
            description
          }
        }
      `;

      const variables = {
        id,
        name: newName,
        description: newDescription
      };

      const data = await graphqlRequest(mutation, variables);
      if (!data) return;

      loadItems();
    }
  </script>
</body>
</html>
